<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>墨卡 · 英语闪卡</title><link rel="stylesheet" href="/static/style.css"></head><body>
<main><header><p class="eyebrow">4.2 INCH EPD · 400 × 300</p><h1>墨卡 <span>English</span></h1><p>为孩子做一张看得清、记得住的单词卡。</p></header>
<section class="maker books"><h2>单词本</h2><form id="book-form"><label>新单词本<input name="name" required placeholder="一年级上册"></label><button>新建单词本</button></form><div id="book-list" class="book-list"></div></section>
<section class="maker"><div class="section-title"><h2>新建闪卡</h2><button class="quiet" type="button" id="enrich">自动补全</button></div><form id="create-form"><label>单词<input name="word" required placeholder="apple"></label><label>音标<input name="ipa" placeholder="/ˈæp.əl/"></label><label>音节<input name="syllables" placeholder="ap-ple"></label><label>记忆提示<input name="hint" placeholder="a red apple"></label><label class="book-choice">加入单词本<select name="book_ids" multiple></select></label><button>保存单词</button></form><p class="help">自动补全从词典取得音标和释义，并估算音节；提交前可以自由修改。</p></section>
<section><div class="section-title"><h2>我的单词</h2><div class="toolbar"><select id="book-filter"><option value="">全部单词本</option></select><button class="quiet" id="batch">后台批量生成</button><button class="quiet" id="refresh">刷新</button></div></div><div class="progress"><div class="bar"><i></i></div><span id="progress-label">读取状态中…</span></div><div id="cards" class="cards"><p class="loading">正在读取…</p></div></section></main>
<template id="card-template"><article class="card"><div class="preview"></div><div class="details"><div class="card-top"><h3></h3><span class="status"></span></div><p class="pronunciation"></p><p class="hint"></p><p class="book-tags"></p><label class="assign">所属单词本<select multiple></select></label><p class="review"></p><div class="actions"><button class="generate">强制重新生成</button><button class="review-btn quiet">复习一次</button><button class="epd quiet">发送至 EPD</button><button class="delete danger">删除</button></div></div></article></template><script src="/static/app.js"></script></body></html>
