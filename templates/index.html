<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>墨卡 · 英语闪卡</title><link rel="stylesheet" href="/static/style.css"></head><body>
<main><header><p class="eyebrow">4.2 INCH EPD · 400 × 300</p><h1>墨卡 <span>English</span></h1><p>为孩子做一张看得清、记得住的单词卡。</p></header>
<section class="maker books"><h2>单词本</h2><form id="book-form"><label>新单词本<input name="name" required placeholder="一年级上册"></label><button>新建单词本</button></form><div id="book-list" class="book-list"></div></section>
<section class="maker"><div class="section-title"><h2>新建闪卡</h2><button class="quiet" type="button" id="enrich">自动补全</button></div><form id="create-form"><label>单词<input name="word" required placeholder="apple"></label><label>音标<input name="ipa" placeholder="/ˈæp.əl/"></label><label>音节<input name="syllables" placeholder="ap-ple"></label><label>记忆提示<input name="hint" placeholder="a red apple"></label><fieldset class="book-picker" data-book-picker="create"><legend>加入单词本</legend></fieldset><button>保存单词</button></form><p class="help">自动补全从词典取得音标和释义，并估算音节；提交前可以自由修改。</p></section>
<section class="maker bulk"><h2>批量添加单词</h2><form id="bulk-form"><label>每行一个单词、词组或用法<textarea name="words" required placeholder="apple&#10;look after&#10;What's this?&#10;New York"></textarea></label><fieldset class="book-picker" data-book-picker="bulk"><legend>加入单词本</legend></fieldset><button>批量保存</button></form><p class="help">会保留大小写与词组；自动清理编号、项目符号、全角空格和行尾标点。保存后会在后台自动补全 IPA、音节与记忆提示。</p><p id="bulk-result" class="help"></p></section>
<section><div class="section-title"><h2>我的单词</h2><div class="toolbar"><input id="search" type="search" placeholder="搜索单词或词组"><select id="sort"><option value="created_desc">最新优先</option><option value="created_asc">最早优先</option><option value="word_asc">A → Z</option><option value="word_desc">Z → A</option><option value="review_desc">复习次数</option></select><select id="book-filter"><option value="">全部单词本</option></select><button class="quiet" id="batch">后台批量生成</button><button class="quiet" id="refresh">刷新</button></div></div><div class="progress"><div class="bar"><i></i></div><span id="progress-label">读取状态中…</span></div><div id="cards" class="cards"><p class="loading">正在读取…</p></div><nav class="pagination"><button class="quiet" id="previous">上一页</button><span id="page-info"></span><button class="quiet" id="next">下一页</button></nav></section></main>
<template id="card-template"><article class="card"><div class="preview"></div><div class="details"><div class="card-top"><h3></h3><span class="status"></span></div><p class="pronunciation"></p><p class="hint"></p><p class="book-tags"></p><fieldset class="book-picker assign"><legend>所属单词本</legend></fieldset><p class="review"></p><div class="actions"><button class="generate">强制重新生成</button><button class="review-btn quiet">复习一次</button><button class="epd quiet">发送至 EPD</button><button class="delete danger">删除</button></div></div></article></template><script src="/static/app.js"></script></body></html>
